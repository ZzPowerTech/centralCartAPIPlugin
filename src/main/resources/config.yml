# Configuração do CentralCart Top Plugin

# URL da API CentralCart
api:
  url: "https://api.centralcart.com.br/v1/app/widget/top_customers"
  timeout: 15000 # Timeout em milissegundos (15 segundos)
  retry_attempts: 3 # Número de tentativas em caso de falha
  retry_delay: 2000 # Delay entre tentativas em milissegundos (2 segundos)
  cache_duration_minutes: 30 # Duração do cache em minutos (otimização de performance)
  # IMPORTANTE: Nunca compartilhe este token publicamente!
  # Obtenha seu token em: https://centralcart.com.br
  token: "COLOQUE_SEU_TOKEN_AQUI"

# Mensagens personalizáveis
messages:
  loading: "§e§l[CentralCart] §aBuscando top doadores do mês anterior..."
  error: "§c§l[CentralCart] §cNão foi possível buscar os dados. Verifique os logs."
  header: "§6§l========================================"
  title: "§e§l      TOP 3 DOADORES DO MÊS ANTERIOR"
  footer: "§6§l========================================"

# Formato de exibição
display:
  show-total: true # Exibir valor total doado
  currency-symbol: "R$" # Símbolo da moeda

# Medalhas por posição
medals:
  first: "§6🥇"
  second: "§7🥈"
  third: "§c🥉"

# Configuração dos NPCs (requer Citizens)
npcs:
  enabled: true # Ativar criação automática de NPCs
  auto_spawn_on_start: true # Spawnar NPCs automaticamente quando o servidor iniciar (se não houver NPCs salvos)
  auto_update_enabled: true # Atualizar NPCs automaticamente todo dia 1º do mês
  # ATENÇÃO: Os NPCs são reutilizados! Ao executar /spawntopnpcs:
  # - NPCs existentes serão movidos e atualizados
  # - Novos NPCs só são criados se não existirem
  # - A skin do jogador é atualizada automaticamente
  #
  # ATUALIZAÇÃO AUTOMÁTICA:
  # - Todo dia 1º do mês às 00:00h os NPCs são atualizados automaticamente
  # - Os administradores online são notificados
  # - Os logs registram a atualização
  # Localizações dos NPCs (world, x, y, z, yaw, pitch)
  locations:
    first:
      world: "world"
      x: 0.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
    second:
      world: "world"
      x: 3.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
    third:
      world: "world"
      x: 6.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
  # Nomes exibidos acima dos NPCs
  names:
    first: "§6{player} §e- 1º Lugar"
    second: "§7 {player} §e- 2º Lugar"
    third: "§c {player} §e- 3º Lugar"

# Notificação de novo post no blog
blog:
  enabled: true
  last_seen_post_id: ""   # gerenciado automaticamente pelo plugin
  notification:
    lines:
      - "&6&l========================================"
      - "  &f📢 <gold><bold>Nova Postagem no Blog!</bold></gold>"
      - "  <white>Uma nova postagem foi feita no site!</white>"
      - "  <click:open_url:'{url}'><aqua>➡️ Clique aqui para ler</aqua></click>"
      - "  <gray>🕒 {time} - {title}</gray>"
      - "&6&l========================================"
